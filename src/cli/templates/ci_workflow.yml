# megagrep indexing workflow — runs on merge to main.
# Generated by `megagrep init`. Customize as needed.

name: megagrep-index

on:
  push:
    branches: [main]

concurrency:
  group: megagrep-${{ github.repository }}
  cancel-in-progress: true

jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for git diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install megagrep
        run: cargo install megagrep

      - name: Index
        env:
          TURBOPUFFER_API_KEY: ${{ secrets.TURBOPUFFER_API_KEY }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: megagrep index
