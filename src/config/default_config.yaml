# ~/.config/wdpkr/config.yaml — for local dev use.
# Every field is optional. Env vars override all values here.
# Credentials (API keys) should be set via env vars, not this file.

store:
  provider: turbopuffer
  # Provider-specific settings live in nested blocks:
  # turbopuffer:
  #   api_key: ...                # prefer the TURBOPUFFER_API_KEY env var
  # nidus:                         # local, file-backed, pure-Rust store (provider: nidus)
  #   path: ~/.local/share/wdpkr/nidus          # store directory; or WDPKR_NIDUS_PATH env var

embedder:
  provider: voyage
  model: voyage-code-3
  batch_size: 64
  embed_mode: summary       # 'summary' = embed LLM summaries; 'docstring' = embed code docs + signatures (no LLM, zero Anthropic cost)
  # ollama_host: http://localhost:11434

summarizer:
  provider: anthropic
  model: claude-haiku-4-5-20251001

indexer:
  # namespace: ""             # auto-derived from git remote if empty
  default_branch: main
  concurrency: 8
  max_cost: 50
  hwm_success_threshold: 0.95

# Data sources to index. Omit this block to index repository code only (the
# default `files` tap). Each non-files tap is indexed into its own namespace
# (`<namespace>--<tap>`) and tagged with a `source` field in search results.
# taps:
#   - name: files             # repository code (default when `taps` is omitted)
#   - name: linear            # Linear issues — descriptions + comment threads
#     settings:
#       amount: 100           # ingest the newest N issues (default 50)
#       order_by: updatedAt   # 'updatedAt' (default) or 'createdAt'
#       # team: ENG           # optional team-key filter
#       include_comments: true
#       # api_key_env: LINEAR_API_KEY   # env var holding the key (default)
#     # Set the key via env, not this file: export LINEAR_API_KEY=lin_api_...
#   - name: notion           # Notion pages (implementation specs), indexed
#                            # on demand: wdpkr index --tap notion --doc <id-or-url>
#     settings:
#       include_sections: true          # per-heading section children (default)
#       # notion_version: "2026-03-11"  # Notion-Version header (default)
#       # api_key_env: NOTION_API_KEY   # env var holding the integration token
#       # Per-tap search decay (opt-in): stale docs rank lower over time but
#       # never below `floor`. `wdpkr reinforce notion://<id>` refreshes a doc.
#       decay:
#         enabled: true
#         half_life_days: 90            # score halves every 90 days unused
#         floor: 0.4                    # never decays below 0.4x its raw score
#     # Set the token via env, not this file: export NOTION_API_KEY=secret_...
#     # Share each page with your Notion integration so the API can read it.
#     # Remove a stale spec: wdpkr delete --tap notion "notion://<id>*"
