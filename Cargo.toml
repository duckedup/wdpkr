[package]
name = "megagrep"
version = "0.1.0"
edition = "2024"
rust-version = "1.95"
description = "Conceptual codebase search via vector retrieval over LLM-generated summaries, exposed as a CLI for AI coding agents."
license = "MIT OR Apache-2.0"
publish = false

[lib]
name = "megagrep"
path = "src/lib.rs"

[[bin]]
name = "megagrep"
path = "src/main.rs"

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
dirs = "6"
serde = { version = "1", features = ["derive"] }
serde_yaml = "0.9"
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros"] }

[dev-dependencies]
serial_test = "3"

[profile.release]
lto = "thin"
codegen-units = 1
strip = true
