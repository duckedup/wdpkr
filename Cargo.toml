[package]
name = "megagrep"
version = "0.1.0"
edition = "2024"
rust-version = "1.95"
description = "Conceptual codebase search via vector retrieval over LLM-generated summaries, exposed as a CLI for AI coding agents."
license = "MIT OR Apache-2.0"
publish = false

[lib]
name = "megagrep"
path = "src/lib.rs"

[[bin]]
name = "megagrep"
path = "src/main.rs"

[dependencies]
anyhow = "1"
blake3 = "1"
ignore = "0.4"
async-trait = "0.1"
clap = { version = "4", features = ["derive"] }
serde_json = "1"
dirs = "6"
reqwest = { version = "0.12", features = ["json", "rustls-tls"], default-features = false }
serde = { version = "1", features = ["derive"] }
serde_yaml = "0.9"
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros"] }
tree-sitter = "0.24"
tree-sitter-language = "0.1"
tree-sitter-rust = "0.23"
tree-sitter-go = "0.23"
tree-sitter-javascript = "0.23"
tree-sitter-typescript = "0.23"
tree-sitter-python = "0.23"
tree-sitter-java = "0.23"
tree-sitter-cpp = "0.23"
tree-sitter-c-sharp = "0.23"

[dev-dependencies]
serial_test = "3"

[profile.release]
lto = "thin"
codegen-units = 1
strip = true
