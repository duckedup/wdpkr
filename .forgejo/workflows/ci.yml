name: CI

on: pull_request

jobs:
  build-and-test:
    runs-on: phoenix
    steps:
      - name: Install system packages
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl git build-essential pkg-config
          rm -rf /var/lib/apt/lists/*

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install rustup
        run: |
          set -eu
          # --default-toolchain none → don't install any toolchain yet;
          # rust-toolchain.toml drives the version on first cargo invocation.
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- --default-toolchain none -y --profile minimal --no-modify-path
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Toolchain version
        # First cargo call triggers rustup to fetch the toolchain pinned in
        # rust-toolchain.toml (currently 1.95.0) plus its components
        # (rustfmt, clippy).
        run: |
          cargo --version
          rustc --version
          cargo fmt --version
          cargo clippy --version

      - name: Check Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --all-features

      - name: Release build
        # Verifies profile.release settings (LTO, codegen-units=1, strip)
        # work end-to-end, not just the dev profile.
        run: cargo build --release
