name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # Reclaim ~30 GB by dropping preinstalled toolchains we don't use, so the
      # DuckDB bundled C++ build + cache restore have headroom. Inlined rather
      # than pulling in a third-party action.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          sudo docker image prune --all --force || true
          df -h /

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Swatinem/rust-cache prunes intermediate + workspace artifacts before
      # saving, so the cache stays bounded. The previous raw `target/` cache
      # grew to ~4.6 GB (DuckDB's bundled C++ build) and ran the runner out of
      # disk on restore (`tar: Wrote only N of M bytes`).
      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: check

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --all-features

      - name: Release build
        run: cargo build --release

  miri:
    name: Miri
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Miri
        run: |
          rustup toolchain install nightly --component miri
          rustup override set nightly
          cargo miri setup

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: miri

      - name: Test with Miri
        env:
          MIRIFLAGS: "-Zmiri-disable-isolation -Zmiri-permissive-provenance -Zmiri-ignore-leaks"
        # --no-default-features drops the DuckDB backend: Miri interprets MIR
        # and cannot execute (or usefully compile) its bundled C library FFI.
        run: cargo miri test --no-default-features
